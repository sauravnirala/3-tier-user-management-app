<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        /* Add your custom CSS styles here */
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f7f7f7;
        }
        .navbar {
            background-color: #333;
            color: white;
            overflow: hidden;
        }
        .navbar a {
            float: left;
            display: block;
            color: white;
            text-align: center;
            padding: 14px 16px;
            text-decoration: none;
        }
        .navbar a:hover {
            background-color: #ddd;
            color: rgb(0, 0, 0);
        }
        .top-bar {
            background-color: rgb(25, 25, 105); /* Change the background color */
            color: #e7f1f4; /* Change the text color */
            padding: 8px;
            font-size: 24px;
            font-family: Arial, sans-serif; /* Change the font family */

        }
        .right-links a {
            color: white;
            text-decoration: none;
            margin-left: auto;
        }
        .dropdown-btn {
            background-color: #007bff;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 10px 20px;
            cursor: pointer;
            transition: background-color 0.3s ease;
            position: absolute;
            top: 120px; /* Move down */
            right: 120px; /* Move to the right */
            font-size: 14px;
        }
        .dropdown-btn:hover {
            background-color: #0056b3;
        }
        .dropdown {
            position: absolute;
            top: 120px;
            right: 120px;
            display: inline-block;
        }
        .dropdown-content {
            display: none;
            position: absolute;
            right: 0;
            background-color: #ffffff;
            min-width: 180px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            border-radius: 4px;
            z-index: 1;
        }
        .dropdown-content a {
            color: #333;
            padding: 10px 14px;
            text-decoration: none;
            display: block;
        }
        .dropdown-content a:hover {
            background-color: #f2f2f2;
        }
        .dropdown:hover .dropdown-content {
            display: block;
        }
        .home-content {
            text-align: center;
            margin-top: 80px;
            color: #333;
        }
    </style>
</head>
<body>
    <!-- <div class="navbar">
        <a href="/">Home</a>
        <a href="/get-data">Fetch Data</a>
       
    </div> -->
    
    <div class="top-bar">
        <div class="container">
            <img src="https://storage.googleapis.com/bkt-static-tt/logo.png" width="60" height="60" class="logo" alt="">
            User Management APP
        </div>
        
    </div>
    <div class="dropdown">
        <button class="dropdown-btn">Actions</button>
        <div class="dropdown-content">
            <a href="/add-user">Add New User</a>
            <a href="/get-data">Fetch Data</a>
            <a href="/get-data?show=all">Show All Data</a>
        </div>
    </div>
    <div class="home-content">
        <h1>Welcome to User Management APP</h1>
        <p>Select an action using the buttons at the top.</p>
    </div>
</body>
</html>
